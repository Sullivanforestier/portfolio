<style>
body {
  margin: 0;
  font-family: "Manrope", Arial, sans-serif;
  background: #f7f6f2;
  color: #111;
}

/* NAV */
nav {
  text-align: center;
  padding: 20px 10px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: #111;
  opacity: 0.7;
  font-size: 14px;
}

nav a:hover {
  opacity: 1;
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px 20px 80px;
}

/* TITRES */
.work-title {
  font-size: 26px;
  margin-bottom: 14px;
}

.italic {
  font-style: italic;
}

/* META */
.work-meta {
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 40px;
}

/* SEPARATION */
.sep {
  margin: 70px 0;
  border-bottom: 1px solid rgba(0,0,0,0.12);
}

/* FRAME */
.frame {
  width: 100%;
  height: 75vh;
  max-height: 800px;
  min-height: 480px;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.08);
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 0.35s ease;
}

.slide {
  min-width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* DOTS */
.dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(0,0,0,0.2);
  cursor: pointer;
}

.dot.active {
  background: rgba(0,0,0,0.75);
}

/* MOBILE */
@media (max-width: 768px) {
  .frame {
    height: 60vh;
  }
}
</style>
</head>

<script>
document.addEventListener("DOMContentLoaded", () => {

function initCarousel(slidesId, dotsId) {
  const slides = document.getElementById(slidesId);
  const dotsContainer = document.getElementById(dotsId);

  if (!slides || !dotsContainer) return;

  const total = slides.children.length;
  let current = 0;
  let startX = 0;

  // DOTS
  for (let i = 0; i < total; i++) {
    const dot = document.createElement("div");
    dot.classList.add("dot");
    if (i === 0) dot.classList.add("active");

    dot.addEventListener("click", () => {
      current = i;
      update();
    });

    dotsContainer.appendChild(dot);
  }

  function update() {
    slides.style.transform = `translateX(-${current * 100}%)`;

    dotsContainer.querySelectorAll(".dot").forEach((d, i) => {
      d.classList.toggle("active", i === current);
    });
  }

  // SWIPE MOBILE
  slides.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  slides.addEventListener("touchend", e => {
    const diff = startX - e.changedTouches[0].clientX;
    const threshold = 40;

    if (diff > threshold && current < total - 1) current++;
    else if (diff < -threshold && current > 0) current--;

    update();
  });

  // DRAG DESKTOP
  let isDown = false;

  slides.addEventListener("mousedown", e => {
    isDown = true;
    startX = e.clientX;
  });

  slides.addEventListener("mouseup", e => {
    if (!isDown) return;
    isDown = false;

    const diff = startX - e.clientX;
    const threshold = 40;

    if (diff > threshold && current < total - 1) current++;
    else if (diff < -threshold && current > 0) current--;

    update();
  });
}

initCarousel("slides1", "dots1");
initCarousel("slides2", "dots2");

});
</script>
